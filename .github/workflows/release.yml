name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet restore src/BinaryBuffers/BinaryBuffers.csproj
          dotnet restore tests/BinaryBuffers.Tests/BinaryBuffers.Tests.csproj

      - name: Build
        run: |
          dotnet build src/BinaryBuffers/BinaryBuffers.csproj -c Release --no-restore
          dotnet build tests/BinaryBuffers.Tests/BinaryBuffers.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/BinaryBuffers.Tests/BinaryBuffers.Tests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/BinaryBuffers/BinaryBuffers.csproj -c Release --no-build -o artifacts

      - name: NuGet login
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts/*.nupkg | Select-Object -First 1
          dotnet nuget push $package.FullName --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
